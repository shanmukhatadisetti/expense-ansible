- name: Enable Nodejs
  ansible.builtin.shell: dnf module disable nodejs -y ; dnf module enable nodejs:18 -y

- name: installing Nodejs
  ansible.builtin.dnf:
    name: nodejs
    state: present

- name: Add application user
  ansible.builtin.user:
    name: expense

- name: Copying backend configuration
  ansible.builtin.template:
    src: backend.service
    dest: /etc/systemd/system/backend.service

- name: Removing app content directory
  ansible.builtin.file:
    path: /app
    state: absent

- name: Creating app content directory
  ansible.builtin.file:
    path: /app
    state: directory

- name: Downloading backend code and extracting
  ansible.builtin.unarchive:
    src: https://expense-artifacts.s3.amazonaws.com/backend.zip
    dest: /app
    remote_src: yes

- name: installing Nodejs Dependencies
  ansible.builtin.shell: npm install
  args:
    chdir: /app

- name: installing mysql client
  ansible.builtin.dnf:
    name: mysql
    state: present

- name: Load schema
  ansible.builtin.shell: mysql -h mysql.autonagar.in -uroot -pExpenseApp@1 < /app/schema/backend.sql

- name: starting backend services
  ansible.builtin.systemd:
    name: backend
    state: restarted
    enabled: yes
    daemon-reload: yes
